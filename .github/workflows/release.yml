name: Release skin

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Verify tag matches package version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $VERSION"
            exit 1
          fi

      - name: Build release zip
        run: npm run release:zip

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ZIP="beanie-$GITHUB_REF_NAME.zip"
          gh release create "$GITHUB_REF_NAME" "$ZIP" \
            --title "Beanie $GITHUB_REF_NAME" \
            --notes "Beanie WebUI skin release $GITHUB_REF_NAME." \
            --verify-tag
