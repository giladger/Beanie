name: Release skin

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Verify tag matches package version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $VERSION"
            exit 1
          fi

      - name: Build release zip
        run: npm run release:zip

      - name: Extract release notes
        id: release_notes
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          node <<'EOF' >> "$GITHUB_OUTPUT"
          const { readFileSync } = require('node:fs');

          const tag = process.env.RELEASE_TAG;
          const changelog = readFileSync('CHANGELOG.md', 'utf8');
          const heading = new RegExp(`^##\\s+${escapeRegExp(tag)}(?:\\s+-\\s+.*)?\\s*$`, 'm');
          const match = heading.exec(changelog);

          if (!match) {
            console.error(`No CHANGELOG.md section found for ${tag}.`);
            process.exit(1);
          }

          const bodyStart = match.index + match[0].length;
          const rest = changelog.slice(bodyStart);
          const nextHeading = rest.search(/^##\s+/m);
          const notes = (nextHeading === -1 ? rest : rest.slice(0, nextHeading)).trim();

          if (!notes) {
            console.error(`CHANGELOG.md section for ${tag} is empty.`);
            process.exit(1);
          }

          console.log('notes<<RELEASE_NOTES');
          console.log(notes);
          console.log('RELEASE_NOTES');

          function escapeRegExp(value) {
            return value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          }
          EOF

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_NOTES: ${{ steps.release_notes.outputs.notes }}
        run: |
          ZIP="beanie-$GITHUB_REF_NAME.zip"
          gh release create "$GITHUB_REF_NAME" "$ZIP" \
            --title "Beanie $GITHUB_REF_NAME" \
            --notes "$RELEASE_NOTES" \
            --verify-tag
